<!DOCTYPE html>
<html>
<head>
    <title>AI Recruitment Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: url('https://images.unsplash.com/photo-1557683316-973673baf926') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            min-height: 100vh;
            padding: 40px;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
            background: rgba(255,255,255,0.15);
        }

        .name {
            font-weight: 600;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .shortlisted { background: #2ecc71; }
        .review { background: #f1c40f; color: black; }
        .rejected { background: #e74c3c; }

        .score {
            font-weight: bold;
            font-size: 18px;
        }

    </style>
</head>

<body>

<div class="overlay">

    <h1>AI Recruitment Dashboard 🚀</h1>
<div style="text-align:center; margin-bottom:20px;">
    <a href="/api/add-candidate/"
       style="
        background:#2ecc71;
        color:white;
        padding:10px 18px;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
       ">
       + Add New Candidate
    </a>
</div>
    <div class="container">

        {% for c in candidates %}
        <div class="card">

            <div>
                <div class="name">{{ c.name }}</div>
                <div style="font-size: 13px; opacity: 0.8;">
                    {{ c.role }}
                </div>
            </div>

            <div class="score">
                {{ c.score }}
            </div>

            <div>
                <span class="badge
                    {% if c.status == 'SHORTLISTED' %}shortlisted
                    {% elif c.status == 'REVIEW' %}review
                    {% else %}rejected{% endif %}">
                    {{ c.status }}
                </span>
            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
